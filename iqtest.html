<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Официальный IQ Тест™</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --card: #111;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --text: #e0e0e0;
    --dim: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(255,255,255,0.015) 2px, rgba(255,255,255,0.015) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.6s ease;
  }

  .badge {
    display: inline-block;
    background: var(--accent);
    color: #000;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    padding: 4px 12px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 12vw, 96px);
    line-height: 0.9;
    letter-spacing: 2px;
    color: #fff;
  }

  h1 span { color: var(--accent); display: block; }

  .subtitle {
    margin-top: 12px;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 1px;
  }

  .progress-bar {
    width: 100%;
    height: 2px;
    background: var(--border);
    margin-bottom: 32px;
    position: relative;
    animation: fadeIn 0.4s ease;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  }

  .progress-label {
    position: absolute;
    right: 0;
    top: 6px;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 32px;
    margin-bottom: 16px;
    animation: slideIn 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .question-card::before {
    content: attr(data-num);
    position: absolute;
    top: -10px; right: 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    color: rgba(255,255,255,0.03);
    line-height: 1;
    pointer-events: none;
  }

  .question-text {
    font-size: 15px;
    line-height: 1.7;
    color: #fff;
    margin-bottom: 24px;
  }

  .question-text em {
    color: var(--accent);
    font-style: normal;
    font-weight: 600;
  }

  .options { display: grid; gap: 8px; }

  .option {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    text-align: left;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .option::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.2s ease;
    z-index: 0;
    opacity: 0.08;
  }

  .option:hover::before { transform: translateX(0); }
  .option:hover { border-color: var(--accent); color: #fff; }
  .option span { position: relative; z-index: 1; }
  .option .letter { color: var(--accent); margin-right: 10px; font-weight: 600; }

  .option.selected {
    border-color: var(--accent);
    background: rgba(232,255,0,0.06);
    color: #fff;
  }

  .option.correct {
    border-color: #00ff88;
    background: rgba(0,255,136,0.06);
    color: #00ff88;
    animation: pulse-green 0.4s ease;
  }

  /* Wrong — quietly fades, no red, no correct reveal */
  .option.quietly-wrong {
    border-color: transparent;
    color: var(--dim);
    opacity: 0.45;
    transition: all 0.3s ease;
  }

  .nav-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 16px;
    animation: fadeIn 0.4s ease;
  }

  .q-counter { font-size: 11px; color: var(--dim); letter-spacing: 2px; }

  .btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 12px 28px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s ease;
  }

  .btn:hover { background: #fff; transform: translateY(-1px); }
  .btn:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; transform: none; }

  /* ─── RESULT SCREEN ─── */
  .result-screen { display: none; text-align: center; animation: fadeDown 0.7s ease; }
  .result-screen.show { display: block; }

  .wheel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 52px);
    color: #fff;
    letter-spacing: 3px;
    margin-bottom: 4px;
  }

  .wheel-subtitle {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 28px;
  }

  .wheel-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 24px;
  }

  .wheel-pointer {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-top: 22px solid var(--accent);
    z-index: 10;
    filter: drop-shadow(0 0 8px rgba(232,255,0,0.8));
  }

  #wheel-canvas {
    display: block;
    border-radius: 50%;
    box-shadow: 0 0 0 4px #1a1a1a, 0 0 0 6px var(--border), 0 0 50px rgba(232,255,0,0.08);
  }

  .spin-btn {
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px 44px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.15s ease;
    display: block;
    margin: 0 auto 36px;
  }

  .spin-btn:hover { background: #fff; transform: translateY(-2px); }
  .spin-btn:disabled { background: var(--border); color: var(--dim); cursor: not-allowed; transform: none; }

  .iq-result-box { display: none; animation: fadeDown 0.6s ease; }
  .iq-result-box.show { display: block; }

  .iq-number {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(90px, 22vw, 160px);
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 80px rgba(232,255,0,0.4);
  }

  .iq-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--dim);
    text-transform: uppercase;
    margin-top: -8px;
    margin-bottom: 20px;
  }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 52px);
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: 2px;
  }

  .result-desc {
    font-size: 13px;
    color: var(--dim);
    line-height: 1.8;
    max-width: 480px;
    margin: 0 auto 28px;
  }

  .restart-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 32px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.2s ease;
  }

  .restart-btn:hover { background: var(--accent); color: #000; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulse-green {
    0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.4); }
    100% { box-shadow: 0 0 0 10px transparent; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="badge">Научно Доказанный™</div>
    <h1>IQ<span>ТЕСТ</span></h1>
    <p class="subtitle">// 10 вопросов · результат через 2 минуты · погрешность ±400%</p>
  </header>

  <div id="quiz-section">
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:0%"></div>
      <span class="progress-label" id="progress-label">0 / 10</span>
    </div>
    <div id="question-container"></div>
    <div class="nav-row">
      <span class="q-counter" id="q-counter">ВОПРОС 1 ИЗ 10</span>
      <button class="btn" id="next-btn" disabled onclick="nextQuestion()">ДАЛЕЕ →</button>
    </div>
  </div>

  <div class="result-screen" id="result-screen">
    <div id="wheel-section">
      <div class="wheel-title">КОЛЕСО ФОРТУНЫ</div>
      <div class="wheel-subtitle">// ваш IQ определяется случайно · как и всё в жизни</div>
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <canvas id="wheel-canvas" width="340" height="340"></canvas>
      </div>
      <button class="spin-btn" id="spin-btn" onclick="spinWheel()">▶ КРУТИТЬ</button>
    </div>

    <div class="iq-result-box" id="iq-result-box">
      <div class="iq-number" id="iq-display">0</div>
      <div class="iq-label">ВАШ ОФИЦИАЛЬНЫЙ IQ</div>
      <div class="result-title" id="result-title"></div>
      <p class="result-desc" id="result-desc"></p>
      <button class="restart-btn" onclick="restart()">↺ ПРОЙТИ ЗАНОВО</button>
    </div>
  </div>

</div>

<script>
const questions = [
  {
    text: "Если у вас есть <em>2 яблока</em>, и вы съели одно — сколько у вас осталось?",
    options: ["1 яблоко", "2 яблока (я всё придумал)", "Это зависит от размера яблок", "Нужно больше данных для ответа"],
    correct: 0
  },
  {
    text: "Какого цвета <em>белый конь Наполеона</em>?",
    options: ["Гнедой", "Серый в яблоках", "Белый", "У Наполеона не было коня, он был маленький"],
    correct: 2
  },
  {
    text: "Поезд выехал из Москвы в 08:00 и прибыл в Питер в 12:00. Сколько <em>вагонов</em> в поезде?",
    options: ["4 часа", "16 вагонов", "В условии нет этой информации", "Сначала скажи зачем"],
    correct: 2
  },
  {
    text: "Дано: все кошки — животные. Вася — не животное. Следовательно, Вася — это...",
    options: ["Не кошка", "Кошка, но другая", "Робот", "Вася — это Вася, не лезь"],
    correct: 0
  },
  {
    text: "Если бросить монету 1000 раз и все 1000 раз выпадет орёл — какова вероятность орла на <em>1001-м броске</em>?",
    options: ["99.99%", "0.01%", "50% — монета не помнит прошлое", "Это не честная монета, звони в полицию"],
    correct: 2
  },
  {
    text: "В комнате 4 угла. В каждом углу сидит кошка. Напротив каждой кошки — <em>3 кошки</em>. Сколько кошек в комнате?",
    options: ["16 кошек", "4 кошки", "13 кошек", "Это квантовый кот Шрёдингера"],
    correct: 1
  },
  {
    text: "Что тяжелее: <em>килограмм ваты</em> или килограмм железа?",
    options: ["Железо, оно же твёрдое", "Вата, её больше", "Одинаково — оба по килограмму", "Зависит от высоты над уровнем моря"],
    correct: 2
  },
  {
    text: "Ты видишь зелёный огонь светофора. Что ты делаешь?",
    options: ["Еду", "Достаю телефон и фотографирую", "Проверяю, не красный ли это на самом деле", "Жду, пока все остальные не проедут сначала"],
    correct: 0
  },
  {
    text: "<em>Чай</em> горячий. Кружка — тоже горячая. Если добавить лёд, что произойдёт?",
    options: ["Чай станет холоднее", "Лёд растает", "Температура выровняется", "Все три варианта верны"],
    correct: 3
  },
  {
    text: "Этот тест измеряет ваш реальный IQ?",
    options: ["Да, конечно", "Нет, это шуточный тест", "Частично", "Это зависит от моего настроения"],
    correct: 1
  }
];

const wheelSegments = [
  { iq: 47,  label: "47",  title: "ТЫКВА",                   desc: "Рекорд низкий, но зато эксклюзивный. Учёные в шоке. Вы — нет, потому что не поняли.",        color: "#e63946" },
  { iq: 200, label: "200", title: "ЭЙНШТЕЙН КУРИТ",          desc: "Ваш IQ настолько высок, что прибор зашкалил. Поздравляем с победой над физикой.",           color: "#e8ff00" },
  { iq: 89,  label: "89",  title: "НОРМ ЧУВАК",              desc: "Вы в самом центре кривой нормального распределения. Буквально средний человек. Это ок.",      color: "#4cc9f0" },
  { iq: 132, label: "132", title: "ПОЧТИ ГЕНИЙ",             desc: "До Менсы чуть-чуть не хватает. Умнее 98% людей — кроме тех 2%, которые тоже так думают.",   color: "#f77f00" },
  { iq: 69,  label: "69",  title: "ХОРОШО ХОТЬ КРАСИВО",    desc: "Число говорит само за себя. Математики называют его «приятным». Совпадение? Не думаем.",     color: "#c77dff" },
  { iq: 101, label: "101", title: "НА ЕДИНИЦУ УМНЕЕ 100",   desc: "Строго выше среднего. На одну единицу. Можно гордиться. Мы не шутим.",                       color: "#06d6a0" },
  { iq: 9,   label: "9",   title: "СЕНСАЦИЯ",                desc: "Ваш IQ — однозначное число. Вы — живая загадка. Как вы дошли до конца теста?",               color: "#ff6b6b" },
  { iq: 158, label: "158", title: "ЧТО-ТО ПОДОЗРИТЕЛЬНОЕ",  desc: "Либо вы гений, либо читали ответы. Оба варианта полностью объясняют результат.",             color: "#ffd60a" },
];

let current = 0;
let score = 0;
let answered = false;
const letters = ['A', 'B', 'C', 'D'];

function renderQuestion() {
  const q = questions[current];
  answered = false;
  document.getElementById('next-btn').disabled = true;
  document.getElementById('q-counter').textContent = `ВОПРОС ${current+1} ИЗ ${questions.length}`;
  document.getElementById('progress').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('progress-label').textContent = `${current} / ${questions.length}`;

  document.getElementById('question-container').innerHTML = `
    <div class="question-card" data-num="${current+1}">
      <div class="question-text">${q.text}</div>
      <div class="options">
        ${q.options.map((opt, i) => `
          <button class="option" onclick="selectOption(this, ${i})">
            <span><span class="letter">${letters[i]}.</span>${opt}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function selectOption(el, index) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const options = document.querySelectorAll('.option');
  options.forEach(o => o.style.pointerEvents = 'none');
  el.classList.add('selected');

  setTimeout(() => {
    if (index === q.correct) {
      el.classList.remove('selected');
      el.classList.add('correct');
      score++;
    } else {
      // Silent failure — just dims, no red, no correct answer shown
      el.classList.remove('selected');
      el.classList.add('quietly-wrong');
    }
    document.getElementById('next-btn').disabled = false;
    document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'РЕЗУЛЬТАТ →' : 'ДАЛЕЕ →';
  }, 200);
}

function nextQuestion() {
  current++;
  if (current >= questions.length) showWheelScreen();
  else renderQuestion();
}

// ─── WHEEL ───────────────────────────────────────────

let wheelAngle = 0;
let spinning = false;
let selectedSegment = null;

function drawWheel(angle) {
  const canvas = document.getElementById('wheel-canvas');
  const ctx = canvas.getContext('2d');
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const r = cx - 4;
  const n = wheelSegments.length;
  const arc = (Math.PI * 2) / n;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < n; i++) {
    const start = angle + i * arc - Math.PI / 2;
    const end = start + arc;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = wheelSegments[i].color;
    ctx.fill();
    ctx.strokeStyle = '#0a0a0a';
    ctx.lineWidth = 2.5;
    ctx.stroke();

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(start + arc / 2);
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.font = `bold 20px 'Bebas Neue', sans-serif`;
    ctx.fillText(wheelSegments[i].label, r - 10, 7);
    ctx.restore();
  }

  // Hub
  ctx.beginPath();
  ctx.arc(cx, cy, 22, 0, Math.PI * 2);
  ctx.fillStyle = '#0a0a0a';
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(cx, cy, 7, 0, Math.PI * 2);
  ctx.fillStyle = '#e8ff00';
  ctx.fill();
}

function spinWheel() {
  if (spinning) return;
  spinning = true;
  document.getElementById('spin-btn').disabled = true;

  const n = wheelSegments.length;
  const arc = (Math.PI * 2) / n;
  const targetIndex = Math.floor(Math.random() * n);

  // Land near the middle of chosen segment
  const extraRotations = (5 + Math.floor(Math.random() * 4)) * Math.PI * 2;
  const offsetInSeg = arc * (0.2 + Math.random() * 0.6);
  const targetAngle = -(targetIndex * arc + offsetInSeg);
  const totalRotation = extraRotations + ((targetAngle - (wheelAngle % (Math.PI * 2)) + Math.PI * 2 * 10) % (Math.PI * 2 * 10));

  const duration = 4200 + Math.random() * 800;
  const startAngle = wheelAngle;
  const endAngle = startAngle + totalRotation;
  const startTime = performance.now();

  function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

  function animate(now) {
    const t = Math.min((now - startTime) / duration, 1);
    wheelAngle = startAngle + (endAngle - startAngle) * easeOut(t);
    drawWheel(wheelAngle);
    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      wheelAngle = endAngle;
      drawWheel(wheelAngle);
      spinning = false;
      selectedSegment = wheelSegments[targetIndex];
      setTimeout(showIQResult, 700);
    }
  }

  requestAnimationFrame(animate);
}

function showWheelScreen() {
  document.getElementById('quiz-section').style.display = 'none';
  document.getElementById('result-screen').classList.add('show');
  drawWheel(0);
}

function showIQResult() {
  const seg = selectedSegment;
  const box = document.getElementById('iq-result-box');
  box.classList.add('show');

  document.getElementById('result-title').textContent = seg.title;
  document.getElementById('result-desc').textContent = seg.desc;

  const iqEl = document.getElementById('iq-display');
  iqEl.style.color = seg.color;
  iqEl.style.textShadow = `0 0 80px ${seg.color}55`;

  let n = 0;
  const step = Math.max(1, Math.ceil(seg.iq / 55));
  const timer = setInterval(() => {
    n = Math.min(n + step, seg.iq);
    iqEl.textContent = n;
    if (n >= seg.iq) clearInterval(timer);
  }, 22);
}

function restart() {
  current = 0; score = 0; answered = false;
  spinning = false; wheelAngle = 0; selectedSegment = null;

  document.getElementById('quiz-section').style.display = 'block';
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('iq-result-box').classList.remove('show');
  document.getElementById('spin-btn').disabled = false;

  const iqEl = document.getElementById('iq-display');
  iqEl.textContent = '0';
  iqEl.style.color = '';
  iqEl.style.textShadow = '';

  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
